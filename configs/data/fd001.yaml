columns:
  id: unit_id
  cycle: cycle
  operational_settings:
    - setting_1
    - setting_2
    - setting_3
  sensors:
    - sensor_1
    - sensor_2
    - sensor_3
    - sensor_4
    - sensor_5
    - sensor_6
    - sensor_7
    - sensor_8
    - sensor_9
    - sensor_10
    - sensor_11
    - sensor_12
    - sensor_13
    - sensor_14
    - sensor_15
    - sensor_16
    - sensor_17
    - sensor_18
    - sensor_19
    - sensor_20
    - sensor_21

labels:
  raw_target: rul_raw
  capped_target: rul_capped
